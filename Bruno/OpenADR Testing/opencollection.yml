opencollection: 1.0.0

info:
  name: OpenADR Testing
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{accessToken}}"
  variables:
    - name: client_id
      value: bl_client
    - name: client_secret
      value: "1001"
    - name: accessToken
      value: ""
    - name: programName
      value: ""
    - name: programId
      value: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
