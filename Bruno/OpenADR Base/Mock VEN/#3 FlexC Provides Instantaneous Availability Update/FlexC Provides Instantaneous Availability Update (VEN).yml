info:
  name: FlexC Provides Instantaneous Availability Update (VEN)
  type: http
  seq: 4
  tags:
    - mock-ven

http:
  method: POST
  url: "{{BASE_URI}}/reports"
  body:
    type: json
    data: |-
      {
        "eventID": "{{eventID}}",
        "reportName": "opsNotifyStateChangeReport",
        "clientName": "{{venName}}",
        "resources": [{
          "resourceName": "RES-001",
          "intervals": [{
            "id": 0,
            "payloads": [{
              "type": "OPERATING_STATE",
              "values": ["ERROR"] // Reporting the new operating state
            }]
          }]
        }]
      }
  auth: inherit

runtime:
  variables:
    - name: eventID
      value: "0"
    - name: venName
      value: VEN-001
  scripts:
    - type: before-request
      code: |-
        const moment = require('moment');
        var reportIntervalStart = moment().toJSON();
        bru.setVar("reportIntervalStart", reportIntervalStart);
    - type: tests
      code: |-
        // Test 1: Verify response status is 201 - CREATED
        test('Status code is 201', function () {
            expect(res.getStatus()).to.equal(201);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
